name: Validation and Sync

on:
  push:
    branches:
      - main
    paths:
      - 'tools.json'
      - 'scripts/**'
      - 'template/**'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun package store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-tools-${{ hashFiles('tools.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-tools-
            ${{ runner.os }}-bun-

      - name: Validate tools.json schema
        run: bun run scripts/checks.ts

      - name: Test tools via bunx
        id: test
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            bun run scripts/test_clients.ts --diff HEAD~1 --output output.log
          else
            bun run scripts/test_clients.ts --all --output output.log
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-report
          path: |
            checks.log
            output.log
          retention-days: 30

      - name: Remove logs from workspace
        if: always()
        run: rm -f checks.log output.log

      - name: Detect README-affecting changes
        id: readme_changed
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if git diff --name-only HEAD~1 HEAD | grep -qE '^(tools\.json|template/)'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate README
        if: steps.readme_changed.outputs.changed == 'true'
        run: bun run scripts/readme.ts

      - name: Commit README if changed
        if: steps.readme_changed.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(readme): regenerate from tools.json [skip ci]'
          file_pattern: README.md

      - name: Fail job if any tools failed
        if: steps.test.outcome == 'failure'
        run: exit 1
