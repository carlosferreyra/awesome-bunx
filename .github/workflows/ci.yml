name: Validation and Sync

on:
  push:
    branches:
      - main
    paths:
      - 'tools.json'
      - 'scripts/**'
      - 'template/**'
      - 'package.json'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Validate tools.json schema
        run: bun run scripts/checks.ts

      - name: Build full tools list
        id: tools
        run: |
          TOOLS=$(bun run scripts/build_tools_list.ts)
          echo "json=$TOOLS" >> "$GITHUB_OUTPUT"

      - name: Test all tools via bunx
        continue-on-error: true
        id: test
        run: |
          bun run scripts/test_clients.ts \
            --tools '${{ steps.tools.outputs.json }}' \
            --output output.log

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            checks.log
            output.log
          retention-days: 30

      - name: Remove logs from workspace
        if: always()
        run: rm -f checks.log output.log

      - name: Generate README
        run: bun run scripts/readme.ts

      - name: Commit README if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(readme): regenerate from tools.json [skip ci]'
          file_pattern: README.md

      - name: Fail job if any tools failed
        if: steps.test.outcome == 'failure'
        run: exit 1
