name: Validate Tool PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tools.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun package store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-tools-${{ hashFiles('tools.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-tools-
            ${{ runner.os }}-bun-

      - name: Validate tools.json schema
        run: bun run scripts/checks.ts

      - name: Test newly added tools via bunx
        id: test
        continue-on-error: true
        run: bun run scripts/test_clients.ts --diff origin/main --output output.log

      - name: Comment on PR — tool failure
        if: steps.test.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTION: comment_failure
        run: bun run scripts/check_and_comment.ts

      - name: Auto-approve PR
        if: steps.test.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ACTION: approve
        run: bun run scripts/check_and_comment.ts

      - name: Fail job if tool tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1
